<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cat Break</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app-shell">
    <div class="header">
      <span class="logo">🐱</span>
      <div class="header-text">
        <h1>Take a Break</h1>
        <p>Healthy browsing, one cat at a time</p>
      </div>
      <label class="toggle" title="Enable / disable">
        <input type="checkbox" id="enabled-toggle" checked>
        <span class="toggle-track"><span class="toggle-thumb"></span></span>
      </label>
    </div>

    <div class="tabs" role="tablist" aria-label="Popup sections">
      <button class="tab-btn is-active" data-tab="settings" role="tab" type="button">Settings</button>
      <button class="tab-btn" data-tab="today" role="tab" type="button">Stats</button>
      <button class="tab-btn" data-tab="cat" role="tab" type="button">Cat</button>
    </div>

    <div class="save-indicator" id="save-indicator">Ready</div>

    <section class="tab-panel is-active" data-panel="settings">
      <div class="section">
        <span class="label">Default time limit <span class="info" title="Applies when no site-specific limit is set."></span></span>
        <div class="chip-row" id="default-limit-chips"></div>
        <div class="custom-row">
          <input type="number" id="default-limit" placeholder="min" min="1" max="600" class="num-input">
          <span class="unit">minutes (custom)</span>
        </div>
      </div>

      <div class="section">
        <span class="label">Limit by site <span class="info" title="Overrides the default for specific sites."></span></span>
        <div id="site-limits" class="site-limits"></div>
        <div class="chip-row" id="per-site-chips"></div>
        <div class="add-row">
          <input type="text" id="add-domain" placeholder="youtube.com" class="site-input">
          <input type="number" id="add-limit" placeholder="min" min="1" max="600" class="min-input">
          <button id="add-btn" class="add-btn">Add</button>
        </div>
      </div>

      <div class="section">
        <span class="label">Excluded sites <span class="info" title="These sites are not tracked or blocked."></span></span>
        <div id="excluded-sites" class="site-limits"></div>
        <div class="add-row">
          <input type="text" id="exclude-domain" placeholder="example.com" class="site-input">
          <button id="exclude-add-btn" class="add-btn">Exclude</button>
        </div>
      </div>

      <div class="section is-hidden" id="quick-action-section">
        <span class="label">Quick action</span>
        <button id="shoo-cat-btn-settings" class="shoo-cat-btn is-hidden">Shoo cat away</button>
      </div>
    </section>

    <section class="tab-panel" data-panel="today">
      <div class="section">
        <div class="section-header">
          <span class="label">Today's usage</span>
          <button id="reset-all-btn" class="reset-btn" type="button">Reset today</button>
        </div>
        <div id="stats-list" class="stats-list">
          <div class="empty">Loading...</div>
        </div>
      </div>
    </section>

    <section class="tab-panel" data-panel="cat">
      <div class="section">
        <span class="label">Cat linger duration <span class="info" title="How long the overlay stays before auto-dismiss."></span></span>
        <div class="chip-row" id="cat-linger-chips"></div>
        <div class="custom-row">
          <input type="number" id="cat-linger" min="0.1" max="60" step="0.1" class="num-input">
          <span class="unit">minutes (custom)</span>
        </div>
      </div>

      <div class="section">
        <span class="label">Cat video</span>
        <div id="cat-video-grid" class="cat-video-grid"></div>
        <input type="hidden" id="cat-video">
      </div>

      <div class="section">
        <span class="label">Preview</span>
        <button id="preview-cat-btn" class="preview-cat-btn">Show walking cat now</button>
        <button id="shoo-cat-btn" class="shoo-cat-btn is-hidden">Shoo cat away</button>
        <p id="preview-msg" class="preview-msg"></p>
      </div>
    </section>
    <div class="review-banner" id="review-banner">
      <span>🐾 Enjoying Cat Break?</span>
      <a id="review-link" class="review-link" target="_blank" rel="noopener">Leave a review ★</a>
      <button class="review-dismiss" id="review-dismiss" title="Dismiss">✕</button>
    </div>
  </div>
  <div id="toast" class="toast" aria-live="polite"></div>
  <script src="popup.js"></script>
</body>
</html>
